<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ext-container">
    <div class="ext-header">
      <div class="logo-box">
        <svg viewBox="0 0 24 24" class="logo-icon"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        <h3>Antigravity Job Tracker</h3>
      </div>
      <span class="status-indicator" id="serverStatus">Checking server...</span>
    </div>

    <div class="action-row" id="autoFillRow" style="margin-top: 4px;">
      <button id="autofillBtn" class="btn-autofill disabled">
        <span>⚡ Auto-fill Application Form</span>
      </button>
    </div>

    <div id="loader" class="loader-container">
      <div class="spinner"></div>
      <p>Reading page details...</p>
    </div>

    <div id="mainForm" style="display: none;">
      <div class="form-group">
        <label>Job Title</label>
        <input type="text" id="jobTitle" required>
      </div>

      <div class="form-group">
        <label>Company</label>
        <input type="text" id="jobCompany" required>
      </div>

      <div class="form-group-row">
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="jobLocation">
        </div>
        <div class="form-group" style="width: 100px;">
          <label>Source</label>
          <input type="text" id="jobSource">
        </div>
      </div>

      <div class="form-group">
        <label>Job URL (Link)</label>
        <input type="text" id="jobLink" readonly class="readonly-input">
      </div>

      <div class="form-group">
        <label>Description Snippet</label>
        <textarea id="jobDesc" rows="3"></textarea>
      </div>

      <div class="form-group-row">
        <div class="form-group">
          <label>Tracking Status</label>
          <select id="jobStatus">
            <option value="pending_apply">Pending Apply</option>
            <option value="applied">Applied</option>
            <option value="interviewing">Interviewing</option>
            <option value="offer">Offer 🎉</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Quick Note / Log</label>
        <input type="text" id="jobNotes" placeholder="E.g., referrals, deadlines, priority...">
      </div>

      <button id="saveBtn" class="btn-save">
        <span>Save to Dashboard</span>
      </button>

      <div id="responseMessage" class="response-message"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
